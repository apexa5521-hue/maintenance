<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>الأعمال الموكلة — قسم الصيانة والتشغيل | APEXCARE</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:     #0E1117; --ink-2: #1C2333; --ink-3: #2D3748;
  --surface: #F4F7FB; --card:  #FFFFFF;
  --border:  #E2E8F0; --border-2: #CBD5E0;
  --blue:    #2563EB; --blue-lt: #EFF6FF; --blue-dim: #DBEAFE;
  --green:   #16A34A; --green-lt: #F0FDF4; --green-dim: #BBF7D0;
  --amber:   #D97706; --amber-lt: #FFFBEB; --amber-dim: #FDE68A;
  --red:     #DC2626; --red-lt:   #FEF2F2;
  --purple:  #7C3AED; --purple-lt: #F5F3FF; --purple-dim: #DDD6FE;
  --slate:   #64748B; --slate-lt:  #F1F5F9;
  --teal:    #0D9488; --teal-lt:   #F0FDFA;
  --done-c: #16A34A; --done-bg: #F0FDF4; --done-bd: #BBF7D0;
  --prog-c: #2563EB; --prog-bg: #EFF6FF; --prog-bd: #BFDBFE;
  --plan-c: #7C3AED; --plan-bg: #F5F3FF; --plan-bd: #DDD6FE;
  --hold-c: #D97706; --hold-bg: #FFFBEB; --hold-bd: #FDE68A;
  --r: 10px; --r2: 6px; --r3: 8px;
  --sh:  0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
  --sh2: 0 4px 16px rgba(0,0,0,.10);
  --font: 'Tajawal', sans-serif; --mono: 'JetBrains Mono', monospace;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { font-family:var(--font); background:var(--surface); color:var(--ink); min-height:100vh; font-size:15px; line-height:1.6; -webkit-tap-highlight-color:transparent; }

/* ── HEADER ── */
.header { background:var(--ink); color:#fff; padding:0 16px; position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(0,0,0,.25); }
.header-inner { max-width:960px; margin:0 auto; height:56px; display:flex; align-items:center; justify-content:space-between; }
.header-brand { display:flex; align-items:center; gap:10px; }
.header-logo { width:32px; height:32px; background:var(--blue); border-radius:7px; display:flex; align-items:center; justify-content:center; }
.header-logo svg { width:16px; height:16px; fill:none; stroke:#fff; stroke-width:2.3; }
.header-title { font-size:14px; font-weight:700; }
.header-sub   { font-size:10px; color:#94A3B8; }
.header-date  { font-family:var(--mono); font-size:10px; color:#64748B; background:#1C2333; padding:4px 10px; border-radius:20px; }

/* ── NAV ── */
.nav-wrap { background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:56px; z-index:90; }
.nav-inner { max-width:960px; margin:0 auto; display:flex; gap:0; overflow-x:auto; scrollbar-width:none; padding:0 16px; }
.nav-inner::-webkit-scrollbar { display:none; }
.nav-tab { flex-shrink:0; padding:12px 16px; border:none; background:transparent; font-family:var(--font); font-size:13px; font-weight:500; color:var(--slate); cursor:pointer; border-bottom:2px solid transparent; transition:all .16s; white-space:nowrap; }
.nav-tab.active { color:var(--blue); border-bottom-color:var(--blue); font-weight:700; }
.nav-tab:hover:not(.active) { color:var(--ink-3); background:var(--slate-lt); }

/* ── BRANCH BAR ── */
.branch-bar { background:var(--card); border-bottom:1px solid var(--border); }
.branch-inner { max-width:960px; margin:0 auto; padding:10px 16px; display:flex; align-items:center; gap:8px; overflow-x:auto; scrollbar-width:none; }
.branch-inner::-webkit-scrollbar { display:none; }
.branch-label { font-size:11px; font-weight:700; color:var(--slate); white-space:nowrap; margin-left:4px; }
.branch-chip {
  flex-shrink:0; padding:5px 14px; border:1.5px solid var(--border);
  border-radius:99px; font-family:var(--font); font-size:12px; font-weight:600;
  color:var(--slate); background:var(--card); cursor:pointer; transition:all .15s;
  white-space:nowrap;
}
.branch-chip.active  { border-color:var(--blue); background:var(--blue); color:#fff; }
.branch-chip.buraydah.active { border-color:var(--teal); background:var(--teal); }
.branch-chip.unaizah.active  { border-color:var(--purple); background:var(--purple); }
.branch-chip.all.active      { border-color:var(--ink); background:var(--ink); }
.btn-add-branch {
  flex-shrink:0; padding:5px 12px; border:1.5px dashed var(--border);
  border-radius:99px; font-family:var(--font); font-size:12px; font-weight:600;
  color:var(--slate); background:transparent; cursor:pointer; transition:all .15s;
}
.btn-add-branch:hover { border-color:var(--blue); color:var(--blue); }

/* ── MAIN ── */
.main { flex:1; max-width:960px; margin:0 auto; width:100%; padding:20px 16px 80px; }
.panel { display:none; }
.panel.active { display:block; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* ── KPI GRID ── */
.dash-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px; }
@media(min-width:540px) { .dash-grid { grid-template-columns:repeat(4,1fr); } }
.kpi-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:14px 16px; box-shadow:var(--sh); position:relative; overflow:hidden; }
.kpi-card::after { content:''; position:absolute; top:0; right:0; width:3px; height:100%; }
.kpi-card.k-total::after { background:var(--ink-3); }
.kpi-card.k-done::after  { background:var(--green); }
.kpi-card.k-prog::after  { background:var(--blue); }
.kpi-card.k-plan::after  { background:var(--purple); }
.kpi-card.k-hold::after  { background:var(--amber); }
.kpi-num { font-size:32px; font-weight:800; font-family:var(--mono); line-height:1; margin-bottom:3px; }
.kpi-card.k-total .kpi-num { color:var(--ink); }
.kpi-card.k-done  .kpi-num { color:var(--green); }
.kpi-card.k-prog  .kpi-num { color:var(--blue); }
.kpi-card.k-plan  .kpi-num { color:var(--purple); }
.kpi-card.k-hold  .kpi-num { color:var(--amber); }
.kpi-label { font-size:11px; color:var(--slate); font-weight:500; }

/* ── BRANCH KPI CARDS ── */
.branch-kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; margin-bottom:16px; }
.bkpi { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:14px; box-shadow:var(--sh); }
.bkpi-name { font-size:12px; font-weight:700; margin-bottom:8px; padding-bottom:8px; border-bottom:2px solid var(--border); }
.bkpi.buraydah .bkpi-name { color:var(--teal); border-color:var(--teal); }
.bkpi.unaizah  .bkpi-name { color:var(--purple); border-color:var(--purple); }
.bkpi-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.bkpi-lbl { font-size:11px; color:var(--slate); }
.bkpi-val { font-size:12px; font-weight:700; font-family:var(--mono); }

/* ── CHART SECTION ── */
.chart-section { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:18px; margin-bottom:12px; box-shadow:var(--sh); }
.chart-title { font-size:12px; font-weight:700; color:var(--ink-3); margin-bottom:14px; text-transform:uppercase; letter-spacing:.5px; }
.bar-row { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
.bar-label { font-size:11px; color:var(--slate); width:52px; text-align:right; flex-shrink:0; }
.bar-track { flex:1; height:7px; background:var(--border); border-radius:99px; overflow:hidden; }
.bar-fill  { height:100%; border-radius:99px; transition:width .8s ease; }
.bar-count { font-family:var(--mono); font-size:11px; font-weight:600; color:var(--slate); width:20px; text-align:left; }
.ring-outer { position:relative; width:110px; height:110px; }
.ring-svg { transform:rotate(-90deg); }
.ring-track { fill:none; stroke:var(--border); stroke-width:9; }
.ring-fill  { fill:none; stroke:var(--blue); stroke-width:9; stroke-linecap:round; transition:stroke-dashoffset .9s ease; }
.ring-label { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ring-pct { font-size:22px; font-weight:800; font-family:var(--mono); color:var(--blue); }
.ring-sub { font-size:10px; color:var(--slate); }

/* ── RECENT ITEM ── */
.recent-item { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
.recent-item:last-child { border-bottom:none; padding-bottom:0; }
.recent-bar { width:4px; height:32px; border-radius:99px; flex-shrink:0; }
.recent-info { flex:1; min-width:0; }
.recent-title { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.recent-meta  { font-size:11px; color:var(--slate); margin-top:1px; }

/* ── LIST TOOLBAR ── */
.list-toolbar { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
.search-input { flex:1; min-width:140px; padding:9px 12px; border:1.5px solid var(--border); border-radius:var(--r2); font-family:var(--font); font-size:13px; color:var(--ink); background:var(--card); outline:none; transition:border-color .15s; }
.search-input:focus { border-color:var(--blue); }
.btn-add { padding:9px 16px; background:var(--blue); color:#fff; border:none; border-radius:var(--r2); font-family:var(--font); font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
.btn-add:hover { background:#1D4ED8; }

/* ── FILTER ROW ── */
.filter-row { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.filter-chip { padding:5px 12px; border:1.5px solid var(--border); border-radius:99px; font-family:var(--font); font-size:11px; font-weight:600; color:var(--slate); background:var(--card); cursor:pointer; transition:all .14s; white-space:nowrap; }
.filter-chip.factive { border-color:var(--blue); background:var(--blue); color:#fff; }
.filter-chip.fd.factive { background:var(--done-c); border-color:var(--done-c); }
.filter-chip.fp.factive { background:var(--prog-c); border-color:var(--prog-c); }
.filter-chip.fl.factive { background:var(--plan-c); border-color:var(--plan-c); }
.filter-chip.fh.factive { background:var(--hold-c); border-color:var(--hold-c); }

/* ── ACH CARD ── */
.ach-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); margin-bottom:9px; box-shadow:var(--sh); overflow:hidden; transition:box-shadow .18s; }
.ach-card:hover { box-shadow:var(--sh2); }
.ach-main { padding:13px 14px; display:flex; gap:10px; align-items:flex-start; }
.ach-bar { width:3px; border-radius:99px; flex-shrink:0; align-self:stretch; min-height:36px; }
.ab-مكتمل { background:var(--done-c); } .ab-جارٍ { background:var(--prog-c); }
.ab-مخطط  { background:var(--plan-c); } .ab-متوقف { background:var(--hold-c); }
.ach-body { flex:1; min-width:0; }
.ach-top  { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:5px; }
.ach-title { font-size:13px; font-weight:700; color:var(--ink); line-height:1.4; }
.ach-badges { display:flex; gap:5px; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
.status-badge { font-size:10px; font-weight:700; padding:2px 9px; border-radius:99px; border:1px solid; white-space:nowrap; }
.sb-مكتمل { color:var(--done-c); background:var(--done-bg); border-color:var(--done-bd); }
.sb-جارٍ   { color:var(--prog-c); background:var(--prog-bg); border-color:var(--prog-bd); }
.sb-مخطط   { color:var(--plan-c); background:var(--plan-bg); border-color:var(--plan-bd); }
.sb-متوقف  { color:var(--hold-c); background:var(--hold-bg); border-color:var(--hold-bd); }
.branch-badge { font-size:10px; font-weight:700; padding:2px 9px; border-radius:99px; border:1px solid; white-space:nowrap; }
.bb-بريدة { color:var(--teal); background:var(--teal-lt); border-color:#99F6E4; }
.bb-عنيزة { color:var(--purple); background:var(--purple-lt); border-color:var(--purple-dim); }
.bb-الكل  { color:var(--slate); background:var(--slate-lt); border-color:var(--border-2); }
.ach-desc { font-size:12px; color:var(--ink-3); line-height:1.6; margin-bottom:7px; }
.ach-meta { display:flex; gap:12px; flex-wrap:wrap; }
.meta-item { font-size:10px; color:var(--slate); display:flex; align-items:center; gap:3px; }
.meta-sep  { width:3px; height:3px; border-radius:50%; background:var(--border-2); }
.prog-wrap { padding:0 14px 11px; }
.prog-top  { display:flex; justify-content:space-between; margin-bottom:3px; }
.prog-lbl  { font-size:10px; color:var(--slate); }
.prog-pct  { font-size:10px; font-family:var(--mono); font-weight:600; color:var(--ink-3); }
.prog-track{ height:4px; background:var(--border); border-radius:99px; overflow:hidden; }
.prog-fill { height:100%; border-radius:99px; transition:width .7s ease; }
.pf-مكتمل { background:var(--done-c); } .pf-جارٍ { background:var(--prog-c); }
.pf-مخطط  { background:var(--plan-c); } .pf-متوقف { background:var(--hold-c); }
.ach-actions { border-top:1px solid var(--border); display:flex; }
.act-btn { flex:1; padding:8px 4px; border:none; background:transparent; font-family:var(--font); font-size:11px; font-weight:600; color:var(--slate); cursor:pointer; transition:all .14s; }
.act-btn:hover { background:var(--slate-lt); color:var(--ink); }
.act-btn.danger:hover { background:var(--red-lt); color:var(--red); }
.act-btn + .act-btn { border-right:1px solid var(--border); }

/* ── EMPTY ── */
.empty-state { text-align:center; padding:50px 16px; }
.empty-icon { width:52px; height:52px; background:var(--border); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 14px; }
.empty-icon svg { width:24px; height:24px; stroke:var(--slate); fill:none; stroke-width:1.8; }
.empty-title { font-size:14px; font-weight:700; margin-bottom:5px; }
.empty-sub   { font-size:12px; color:var(--slate); }

/* ── LOG ── */
.log-header { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.log-title  { font-size:14px; font-weight:700; }
.log-count  { font-family:var(--mono); font-size:11px; background:var(--blue); color:#fff; padding:2px 7px; border-radius:99px; }
.log-entry  { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:12px 14px; margin-bottom:7px; box-shadow:var(--sh); display:grid; grid-template-columns:16px 1fr; gap:10px; align-items:start; }
.log-dot    { width:10px; height:10px; border-radius:50%; margin-top:3px; }
.log-dot.add    { background:var(--green); } .log-dot.edit  { background:var(--blue); }
.log-dot.delete { background:var(--red);   } .log-dot.status{ background:var(--amber); }
.log-body   { min-width:0; }
.log-top    { display:flex; align-items:center; gap:7px; margin-bottom:3px; flex-wrap:wrap; }
.lab        { font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; }
.lab-add    { background:var(--green-lt); color:var(--green); }
.lab-edit   { background:var(--blue-lt);  color:var(--blue); }
.lab-delete { background:var(--red-lt);   color:var(--red); }
.lab-status { background:var(--amber-lt); color:var(--amber); }
.log-ach    { font-size:12px; font-weight:700; color:var(--ink); }
.log-detail { font-size:11px; color:var(--slate); line-height:1.6; margin-bottom:3px; }
.log-note   { font-size:11px; color:var(--ink-3); font-style:italic; margin-bottom:3px; }
.log-time   { font-family:var(--mono); font-size:10px; color:var(--border-2); }

/* ── OVERLAY / DRAWER ── */
.overlay { position:fixed; inset:0; background:rgba(14,17,23,.5); z-index:200; display:none; align-items:flex-end; justify-content:center; backdrop-filter:blur(2px); }
.overlay.open { display:flex; animation:ovi .2s ease; }
@keyframes ovi { from{opacity:0} to{opacity:1} }
.drawer { background:var(--card); border-radius:16px 16px 0 0; width:100%; max-width:600px; max-height:92vh; overflow-y:auto; animation:dri .26s cubic-bezier(.32,.72,0,1); overscroll-behavior:contain; }
@keyframes dri { from{transform:translateY(100%)} to{transform:translateY(0)} }
.drawer-handle { width:36px; height:4px; background:var(--border); border-radius:99px; margin:10px auto 0; }
.drawer-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px 12px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--card); z-index:1; }
.drawer-title  { font-size:15px; font-weight:700; }
.drawer-close  { width:28px; height:28px; border:1px solid var(--border); border-radius:6px; background:var(--slate-lt); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--slate); }
.drawer-body   { padding:18px; }

/* ── FIELDS ── */
.field { margin-bottom:14px; }
.field-label { display:block; font-size:12px; font-weight:700; color:var(--ink-3); margin-bottom:5px; }
.req { color:var(--red); }
input[type=text],input[type=date],textarea,select {
  width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:var(--r2);
  font-family:var(--font); font-size:13px; color:var(--ink); background:var(--card);
  outline:none; transition:border-color .15s,box-shadow .15s; -webkit-appearance:none;
}
input:focus,textarea:focus,select:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.09); }
textarea { resize:vertical; min-height:76px; line-height:1.6; }

/* ── BRANCH SELECTOR IN FORM ── */
.branch-form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:7px; }
.branch-form-opt {
  padding:9px 10px; border:1.5px solid var(--border); border-radius:var(--r2);
  font-family:var(--font); font-size:12px; font-weight:600; color:var(--slate);
  background:var(--card); cursor:pointer; text-align:center; transition:all .15s;
}
.branch-form-opt.sel-بريدة { border-color:var(--teal);   background:var(--teal-lt);   color:var(--teal); }
.branch-form-opt.sel-عنيزة { border-color:var(--purple); background:var(--purple-lt); color:var(--purple); }
.branch-form-opt.sel-الكل  { border-color:var(--ink-3);  background:var(--slate-lt);  color:var(--ink-3); }

/* ── STATUS GRID ── */
.status-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:7px; }
.status-opt { padding:9px 10px; border:1.5px solid var(--border); border-radius:var(--r2); font-family:var(--font); font-size:12px; font-weight:600; color:var(--slate); background:var(--card); cursor:pointer; text-align:center; transition:all .15s; }
.status-opt.sel-مكتمل { border-color:var(--done-c); background:var(--done-bg); color:var(--done-c); }
.status-opt.sel-جارٍ   { border-color:var(--prog-c); background:var(--prog-bg); color:var(--prog-c); }
.status-opt.sel-مخطط   { border-color:var(--plan-c); background:var(--plan-bg); color:var(--plan-c); }
.status-opt.sel-متوقف  { border-color:var(--hold-c); background:var(--hold-bg); color:var(--hold-c); }

/* ── SLIDER ── */
.slider-row { display:flex; align-items:center; gap:10px; }
input[type=range] { flex:1; accent-color:var(--blue); cursor:pointer; }
.slider-val { font-family:var(--mono); font-size:13px; font-weight:700; color:var(--blue); width:40px; text-align:center; }

/* ── BUTTONS ── */
.btn-row { display:flex; gap:8px; margin-top:6px; }
.btn-primary { flex:1; padding:12px; background:var(--blue); color:#fff; border:none; border-radius:var(--r2); font-family:var(--font); font-size:13px; font-weight:700; cursor:pointer; transition:background .15s; }
.btn-primary:hover { background:#1D4ED8; }
.btn-primary:disabled { opacity:.6; pointer-events:none; }
.btn-ghost { padding:12px 18px; background:var(--slate-lt); color:var(--ink-3); border:1px solid var(--border); border-radius:var(--r2); font-family:var(--font); font-size:13px; font-weight:600; cursor:pointer; }

/* ── CONFIRM ── */
.confirm-bar { background:var(--red-lt); border:1px solid #FECACA; border-radius:var(--r2); padding:11px 13px; display:none; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
.confirm-bar.open { display:flex; }
.confirm-msg { font-size:12px; font-weight:600; color:var(--red); }
.cbtn { padding:6px 13px; border:none; border-radius:var(--r2); font-family:var(--font); font-size:11px; font-weight:700; cursor:pointer; }
.cbtn-y { background:var(--red); color:#fff; }
.cbtn-n { background:var(--slate-lt); color:var(--ink-3); border:1px solid var(--border); }

/* ── ADD BRANCH MODAL ── */
.mini-modal { background:var(--card); border-radius:12px; width:90%; max-width:360px; padding:20px; margin:auto; box-shadow:var(--sh2); animation:dri .22s ease; }
.mini-title { font-size:14px; font-weight:700; margin-bottom:14px; }

/* ── TOAST ── */
.toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(14px); background:var(--ink); color:#fff; padding:9px 18px; border-radius:7px; font-size:12px; font-weight:600; opacity:0; transition:all .22s; z-index:999; pointer-events:none; white-space:nowrap; box-shadow:var(--sh2); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.ok  { background:var(--green); } .toast.err { background:var(--red); }

@media(max-width:480px) { .ach-top { flex-direction:column; gap:4px; } .header-date { display:none; } .ach-badges { justify-content:flex-start; } }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-logo">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <div>
        <div class="header-title">الأعمال الموكلة</div>
        <div class="header-sub">APEXCARE — قسم الصيانة</div>
      </div>
    </div>
    <div class="header-date" id="hDate">—</div>
  </div>
</header>

<!-- NAV TABS -->
<div class="nav-wrap">
  <div class="nav-inner">
    <button class="nav-tab active" data-panel="dashboard">لوحة المتابعة</button>
    <button class="nav-tab" data-panel="list">الإنجازات</button>
    <button class="nav-tab" data-panel="history">سجل التعديلات</button>
  </div>
</div>

<!-- BRANCH BAR -->
<div class="branch-bar">
  <div class="branch-inner">
    <span class="branch-label">الفرع:</span>
    <button class="branch-chip all active" data-b="الكل" onclick="setBranchFilter(this,'الكل')">الكل</button>
    <button class="branch-chip buraydah" data-b="بريدة" onclick="setBranchFilter(this,'بريدة')">بريدة</button>
    <button class="branch-chip unaizah"  data-b="عنيزة" onclick="setBranchFilter(this,'عنيزة')">عنيزة</button>
    <div id="extraBranches"></div>
    <button class="btn-add-branch" onclick="openAddBranch()">+ فرع جديد</button>
  </div>
</div>

<!-- MAIN -->
<main class="main">

  <!-- ════ DASHBOARD ════ -->
  <section class="panel active" id="panel-dashboard">

    <!-- KPI overall -->
    <div class="dash-grid">
      <div class="kpi-card k-total"><div class="kpi-num" id="k-total">0</div><div class="kpi-label">الإجمالي</div></div>
      <div class="kpi-card k-done"><div class="kpi-num" id="k-done">0</div><div class="kpi-label">مكتمل</div></div>
      <div class="kpi-card k-prog"><div class="kpi-num" id="k-prog">0</div><div class="kpi-label">جارٍ</div></div>
      <div class="kpi-card k-plan"><div class="kpi-num" id="k-plan">0</div><div class="kpi-label">مخطط</div></div>
    </div>

    <!-- Branch KPI cards -->
    <div class="branch-kpi-grid" id="branchKpiGrid"></div>

    <!-- Charts row -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div class="chart-section" style="display:flex;flex-direction:column;align-items:center">
        <div class="chart-title" style="align-self:flex-start">نسبة الإنجاز الكلية</div>
        <div class="ring-outer">
          <svg class="ring-svg" width="110" height="110" viewBox="0 0 110 110">
            <circle class="ring-track" cx="55" cy="55" r="46"/>
            <circle class="ring-fill" id="ringFill" cx="55" cy="55" r="46" stroke-dasharray="289" stroke-dashoffset="289"/>
          </svg>
          <div class="ring-label">
            <div class="ring-pct" id="ringPct">0%</div>
            <div class="ring-sub">مكتمل</div>
          </div>
        </div>
      </div>
      <div class="chart-section">
        <div class="chart-title">توزيع الحالات</div>
        <div class="bar-row"><div class="bar-label">مكتمل</div><div class="bar-track"><div class="bar-fill" id="bar-done" style="width:0%;background:var(--green)"></div></div><div class="bar-count" id="bc-done">0</div></div>
        <div class="bar-row"><div class="bar-label">جارٍ</div><div class="bar-track"><div class="bar-fill" id="bar-prog" style="width:0%;background:var(--blue)"></div></div><div class="bar-count" id="bc-prog">0</div></div>
        <div class="bar-row"><div class="bar-label">مخطط</div><div class="bar-track"><div class="bar-fill" id="bar-plan" style="width:0%;background:var(--purple)"></div></div><div class="bar-count" id="bc-plan">0</div></div>
        <div class="bar-row"><div class="bar-label">متوقف</div><div class="bar-track"><div class="bar-fill" id="bar-hold" style="width:0%;background:var(--amber)"></div></div><div class="bar-count" id="bc-hold">0</div></div>
      </div>
    </div>

    <!-- Recent -->
    <div class="chart-section">
      <div class="chart-title">آخر الإنجازات المحدّثة</div>
      <div id="dashRecent"><div class="empty-sub" style="text-align:center;padding:16px">لا توجد إنجازات بعد</div></div>
    </div>

  </section>

  <!-- ════ LIST ════ -->
  <section class="panel" id="panel-list">
    <div class="list-toolbar">
      <input class="search-input" id="searchInput" type="text" placeholder="بحث..." oninput="render()">
      <button class="btn-add" onclick="openDrawer()">+ إضافة</button>
    </div>
    <div class="filter-row">
      <button class="filter-chip factive" data-f="all" onclick="setFilter(this,'all')">الكل</button>
      <button class="filter-chip fd" data-f="مكتمل" onclick="setFilter(this,'مكتمل')">مكتمل</button>
      <button class="filter-chip fp" data-f="جارٍ"   onclick="setFilter(this,'جارٍ')">جارٍ</button>
      <button class="filter-chip fl" data-f="مخطط"  onclick="setFilter(this,'مخطط')">مخطط</button>
      <button class="filter-chip fh" data-f="متوقف" onclick="setFilter(this,'متوقف')">متوقف</button>
    </div>
    <div class="confirm-bar" id="confirmBar">
      <span class="confirm-msg">تأكيد حذف هذا الإنجاز؟</span>
      <div style="display:flex;gap:6px">
        <button class="cbtn cbtn-n" onclick="cancelDel()">إلغاء</button>
        <button class="cbtn cbtn-y" onclick="confirmDel()">حذف</button>
      </div>
    </div>
    <div id="achList"></div>
  </section>

  <!-- ════ HISTORY ════ -->
  <section class="panel" id="panel-history">
    <div class="log-header">
      <div class="log-title">سجل التعديلات</div>
      <span class="log-count" id="logCount">0</span>
    </div>
    <div id="historyList"></div>
  </section>

</main>

<!-- DRAWER -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-header">
      <div class="drawer-title" id="drawerTitle">إضافة إنجاز</div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body">
      <input type="hidden" id="f-id">

      <div class="field">
        <label class="field-label"><span class="req">*</span> عنوان الإنجاز</label>
        <input type="text" id="f-title" placeholder="مثال: صيانة ضاغط الهواء المركزي">
      </div>

      <div class="field">
        <label class="field-label"><span class="req">*</span> الفرع</label>
        <div class="branch-form-grid" id="branchFormGrid"></div>
      </div>

      <div class="field">
        <label class="field-label"><span class="req">*</span> الحالة</label>
        <div class="status-grid">
          <button class="status-opt" data-s="مكتمل" onclick="selStatus(this)">مكتمل</button>
          <button class="status-opt" data-s="جارٍ"   onclick="selStatus(this)">جارٍ</button>
          <button class="status-opt" data-s="مخطط"   onclick="selStatus(this)">مخطط</button>
          <button class="status-opt" data-s="متوقف"  onclick="selStatus(this)">متوقف</button>
        </div>
      </div>

      <div class="field">
        <label class="field-label">التفاصيل</label>
        <textarea id="f-desc" placeholder="وصف ما تم إنجازه أو ما هو مخطط..."></textarea>
      </div>

      <div class="field">
        <label class="field-label">نسبة الإنجاز</label>
        <div class="slider-row">
          <input type="range" id="f-prog" min="0" max="100" value="0"
            oninput="document.getElementById('f-prog-val').textContent=this.value+'%'">
          <span class="slider-val" id="f-prog-val">0%</span>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field" style="margin-bottom:0">
          <label class="field-label">تاريخ البدء</label>
          <input type="date" id="f-start">
        </div>
        <div class="field" style="margin-bottom:0">
          <label class="field-label">تاريخ الاكتمال</label>
          <input type="date" id="f-end">
        </div>
      </div>

      <div class="field" style="margin-top:14px">
        <label class="field-label">ملاحظة التعديل <span style="color:var(--slate);font-weight:400">(اختياري — ماذا تغيّر؟)</span></label>
        <input type="text" id="f-note" placeholder="مثال: تم رفع نسبة الإنجاز بعد استلام قطع الغيار">
      </div>

      <div class="btn-row">
        <button class="btn-ghost" onclick="closeDrawer()">إلغاء</button>
        <button class="btn-primary" id="saveBtn" onclick="saveAch()">حفظ</button>
      </div>
    </div>
  </div>
</div>

<!-- ADD BRANCH OVERLAY -->
<div class="overlay" id="branchOverlay" onclick="if(event.target===this)closeBranchModal()" style="align-items:center">
  <div class="mini-modal">
    <div class="mini-title">إضافة فرع جديد</div>
    <div class="field">
      <label class="field-label">اسم الفرع</label>
      <input type="text" id="newBranchName" placeholder="مثال: الرياض">
    </div>
    <div class="btn-row">
      <button class="btn-ghost" onclick="closeBranchModal()">إلغاء</button>
      <button class="btn-primary" onclick="addBranch()">إضافة</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════ CONFIG ═══════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwe_4xsjeUuH2fwIJR3Io5OWb1scm6ehHZOIiB8Foqj2uH69sOJQkBB-gN4VqLwpsdI/exec';

// ═══════════ STATE ═══════════
let achievements  = [];
let history_log   = [];
let branches      = ['بريدة', 'عنيزة'];
let branchFilter  = 'الكل';
let statusFilter  = 'all';
let editingId     = null;
let deletingId    = null;
let currentStatus = null;
let currentBranch = null;

// ═══════════ INIT ═══════════
document.addEventListener('DOMContentLoaded', () => {
  load();
  updateDate();
  setupNav();
  renderBranchBar();
  renderBranchFormGrid();
  render();
  updateDashboard();
  renderHistory();
  document.getElementById('f-start').value = today();
});

function today() { return new Date().toISOString().split('T')[0]; }
function updateDate() {
  document.getElementById('hDate').textContent =
    new Date().toLocaleDateString('ar-SA',{weekday:'short',month:'short',day:'numeric',year:'numeric'}).replace(/\u200f/g,'');
}

// ═══════════ STORAGE ═══════════
function save() {
  localStorage.setItem('apx_m_ach',  JSON.stringify(achievements));
  localStorage.setItem('apx_m_log',  JSON.stringify(history_log));
  localStorage.setItem('apx_m_br',   JSON.stringify(branches));
}
function load() {
  try {
    achievements = JSON.parse(localStorage.getItem('apx_m_ach') || '[]');
    history_log  = JSON.parse(localStorage.getItem('apx_m_log') || '[]');
    const br     = JSON.parse(localStorage.getItem('apx_m_br')  || '["بريدة","عنيزة"]');
    // always ensure defaults
    branches = [...new Set(['بريدة','عنيزة',...br])];
  } catch(e) { achievements=[]; history_log=[]; branches=['بريدة','عنيزة']; }
}

// ═══════════ NAV ═══════════
function setupNav() {
  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.panel)?.classList.add('active');
    });
  });
}

// ═══════════ BRANCH BAR ═══════════
function renderBranchBar() {
  // Remove extra branch chips first
  document.getElementById('extraBranches').innerHTML =
    branches.filter(b => b !== 'بريدة' && b !== 'عنيزة').map(b =>
      `<button class="branch-chip" data-b="${b}" onclick="setBranchFilter(this,'${b}')">${b}</button>`
    ).join('');
}

function setBranchFilter(btn, val) {
  document.querySelectorAll('.branch-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  branchFilter = val;
  render();
  updateDashboard();
}

// ═══════════ BRANCH FORM GRID ═══════════
function renderBranchFormGrid() {
  const grid = document.getElementById('branchFormGrid');
  grid.innerHTML = ['الكل', ...branches].map(b =>
    `<button class="branch-form-opt" data-b="${b}" onclick="selBranch(this,'${b}')">${b}</button>`
  ).join('');
}

function selBranch(btn, val) {
  document.querySelectorAll('.branch-form-opt').forEach(b => {
    b.className = 'branch-form-opt';
  });
  btn.classList.add('sel-' + val);
  currentBranch = val;
}

// ═══════════ ADD BRANCH ═══════════
function openAddBranch() { document.getElementById('branchOverlay').classList.add('open'); setTimeout(()=>document.getElementById('newBranchName').focus(),200); }
function closeBranchModal() { document.getElementById('branchOverlay').classList.remove('open'); document.getElementById('newBranchName').value=''; }
function addBranch() {
  const name = document.getElementById('newBranchName').value.trim();
  if (!name) { showToast('أدخل اسم الفرع', 'err'); return; }
  if (branches.includes(name)) { showToast('الفرع موجود مسبقاً', 'err'); return; }
  branches.push(name);
  save();
  renderBranchBar();
  renderBranchFormGrid();
  closeBranchModal();
  showToast('تم إضافة فرع ' + name, 'ok');
}

// ═══════════ FILTER ═══════════
function setFilter(btn, val) {
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('factive'));
  btn.classList.add('factive');
  statusFilter = val;
  render();
}

function filtered() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
  return achievements.filter(a => {
    const mB = branchFilter === 'الكل' || a.branch === branchFilter;
    const mS = statusFilter === 'all'  || a.status === statusFilter;
    const mQ = !q || a.title.toLowerCase().includes(q) || (a.desc||'').toLowerCase().includes(q);
    return mB && mS && mQ;
  }).sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
}

// ═══════════ RENDER LIST ═══════════
function render() {
  const list = document.getElementById('achList');
  const data = filtered();
  if (!data.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></div>
      <div class="empty-title">${achievements.length===0?'لا توجد إنجازات':'لا نتائج مطابقة'}</div>
      <div class="empty-sub">${achievements.length===0?'اضغط «+ إضافة» لتسجيل أول إنجاز':'جرّب فلتراً آخر'}</div>
    </div>`;
    return;
  }
  list.innerHTML = data.map(a => {
    const pct = parseInt(a.progress)||0;
    const brCls = a.branch === 'بريدة' ? 'bb-بريدة' : a.branch === 'عنيزة' ? 'bb-عنيزة' : 'bb-الكل';
    return `<div class="ach-card">
      <div class="ach-main">
        <div class="ach-bar ab-${a.status}"></div>
        <div class="ach-body">
          <div class="ach-top">
            <div class="ach-title">${a.title}</div>
            <div class="ach-badges">
              <span class="branch-badge ${brCls}">${a.branch}</span>
              <span class="status-badge sb-${a.status}">${a.status}</span>
            </div>
          </div>
          ${a.desc?`<div class="ach-desc">${a.desc}</div>`:''}
          <div class="ach-meta">
            ${a.start?`<span class="meta-item">بدأ: ${a.start}</span>`:''}
            ${a.end?`<span class="meta-item"><span class="meta-sep"></span>اكتمال: ${a.end}</span>`:''}
            <span class="meta-item"><span class="meta-sep"></span>آخر تحديث: ${fmtDate(a.updatedAt)}</span>
          </div>
        </div>
      </div>
      <div class="prog-wrap">
        <div class="prog-top">
          <span class="prog-lbl">نسبة الإنجاز</span>
          <span class="prog-pct">${pct}%</span>
        </div>
        <div class="prog-track"><div class="prog-fill pf-${a.status}" style="width:${pct}%"></div></div>
      </div>
      <div class="ach-actions">
        <button class="act-btn" onclick="openDrawer('${a.id}')">تعديل</button>
        <button class="act-btn" onclick="cycleStatus('${a.id}')">تغيير الحالة</button>
        <button class="act-btn danger" onclick="askDel('${a.id}')">حذف</button>
      </div>
    </div>`;
  }).join('');
}

// ═══════════ DRAWER ═══════════
function openDrawer(id) {
  editingId = id || null;
  const a   = id ? achievements.find(x => x.id === id) : null;
  document.getElementById('drawerTitle').textContent = a ? 'تعديل الإنجاز' : 'إضافة إنجاز';
  document.getElementById('f-id').value    = a?.id || '';
  document.getElementById('f-title').value = a?.title || '';
  document.getElementById('f-desc').value  = a?.desc  || '';
  document.getElementById('f-prog').value  = a?.progress || 0;
  document.getElementById('f-prog-val').textContent = (a?.progress||0) + '%';
  document.getElementById('f-start').value = a?.start || today();
  document.getElementById('f-end').value   = a?.end   || '';
  document.getElementById('f-note').value  = '';

  // status
  currentStatus = a?.status || 'مخطط';
  document.querySelectorAll('.status-opt').forEach(b => {
    b.className = 'status-opt';
    if (b.dataset.s === currentStatus) b.classList.add('sel-' + currentStatus);
  });

  // branch
  currentBranch = a?.branch || 'بريدة';
  document.querySelectorAll('.branch-form-opt').forEach(b => {
    b.className = 'branch-form-opt';
    if (b.dataset.b === currentBranch) b.classList.add('sel-' + currentBranch);
  });

  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 280);
}

function closeDrawer() { document.getElementById('overlay').classList.remove('open'); editingId = null; }
function handleOverlayClick(e) { if (e.target === document.getElementById('overlay')) closeDrawer(); }

function selStatus(btn) {
  document.querySelectorAll('.status-opt').forEach(b => b.className = 'status-opt');
  btn.classList.add('sel-' + btn.dataset.s);
  currentStatus = btn.dataset.s;
  if (btn.dataset.s === 'مكتمل') { document.getElementById('f-prog').value=100; document.getElementById('f-prog-val').textContent='100%'; }
  if (btn.dataset.s === 'مخطط')  { document.getElementById('f-prog').value=0;   document.getElementById('f-prog-val').textContent='0%'; }
}

// ═══════════ SAVE ═══════════
function saveAch() {
  const title = document.getElementById('f-title').value.trim();
  if (!title)         { showToast('أدخل عنوان الإنجاز', 'err'); return; }
  if (!currentStatus) { showToast('اختر الحالة', 'err'); return; }
  if (!currentBranch) { showToast('اختر الفرع', 'err'); return; }

  const btn  = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'جارٍ الحفظ...';

  const isNew = !editingId;
  const now   = new Date().toISOString();
  const note  = document.getElementById('f-note').value.trim();

  let item;
  if (isNew) {
    item = { id:'ach_'+Date.now(), title, branch:currentBranch,
      desc: document.getElementById('f-desc').value.trim(),
      status: currentStatus, progress: parseInt(document.getElementById('f-prog').value),
      start: document.getElementById('f-start').value, end: document.getElementById('f-end').value,
      createdAt: now, updatedAt: now };
    achievements.unshift(item);
    addLog('add', item, 'تم إضافة الإنجاز في فرع ' + currentBranch, note || 'إنجاز جديد');
  } else {
    const idx = achievements.findIndex(x => x.id === editingId);
    const old = {...achievements[idx]};
    item = { ...old, title, branch:currentBranch,
      desc: document.getElementById('f-desc').value.trim(),
      status: currentStatus, progress: parseInt(document.getElementById('f-prog').value),
      start: document.getElementById('f-start').value, end: document.getElementById('f-end').value,
      updatedAt: now };
    achievements[idx] = item;
    addLog('edit', item, buildDiff(old, item), note);
  }

  save();
  syncGAS(item, isNew);
  render(); updateDashboard(); renderHistory();
  closeDrawer();
  btn.disabled = false; btn.textContent = 'حفظ';
  showToast(isNew ? 'تم إضافة الإنجاز' : 'تم حفظ التعديلات', 'ok');
}

function buildDiff(o, n) {
  const p = [];
  if (o.title    !== n.title)    p.push(`العنوان: "${o.title}" ← "${n.title}"`);
  if (o.branch   !== n.branch)   p.push(`الفرع: ${o.branch} ← ${n.branch}`);
  if (o.status   !== n.status)   p.push(`الحالة: ${o.status} ← ${n.status}`);
  if (o.progress !== n.progress) p.push(`الإنجاز: ${o.progress}% ← ${n.progress}%`);
  if (o.end      !== n.end)      p.push(`تاريخ الاكتمال: ${o.end||'—'} ← ${n.end||'—'}`);
  if (o.desc     !== n.desc)     p.push('تم تعديل الوصف');
  return p.length ? p.join(' | ') : 'تعديل عام';
}

// ═══════════ CYCLE STATUS ═══════════
function cycleStatus(id) {
  const order = ['مخطط','جارٍ','متوقف','مكتمل'];
  const a = achievements.find(x => x.id === id); if (!a) return;
  const old = a.status;
  a.status    = order[(order.indexOf(old)+1) % order.length];
  a.updatedAt = new Date().toISOString();
  if (a.status === 'مكتمل') a.progress = 100;
  addLog('status', a, `الحالة: ${old} ← ${a.status}`, '');
  save(); syncGAS(a, false);
  render(); updateDashboard(); renderHistory();
  showToast('الحالة: ' + a.status, 'ok');
}

// ═══════════ DELETE ═══════════
function askDel(id)  { deletingId=id; document.getElementById('confirmBar').classList.add('open'); }
function cancelDel() { deletingId=null; document.getElementById('confirmBar').classList.remove('open'); }
function confirmDel() {
  const a = achievements.find(x => x.id === deletingId);
  if (a) {
    addLog('delete', a, 'تم حذف الإنجاز من فرع ' + a.branch, '');
    achievements = achievements.filter(x => x.id !== deletingId);
    save(); render(); updateDashboard(); renderHistory();
    showToast('تم الحذف', 'err');
  }
  cancelDel();
}

// ═══════════ LOG ═══════════
function addLog(action, ach, detail, note) {
  history_log.unshift({ id:'log_'+Date.now(), achId:ach.id, achTitle:ach.title,
    branch:ach.branch, action, detail, changeNote:note||'', timestamp:new Date().toISOString() });
  if (history_log.length > 300) history_log = history_log.slice(0,300);
  save();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  document.getElementById('logCount').textContent = history_log.length;
  if (!history_log.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div><div class="empty-title">لا توجد سجلات</div><div class="empty-sub">ستظهر هنا كل التعديلات</div></div>`;
    return;
  }
  const amap = {add:'إضافة',edit:'تعديل',delete:'حذف',status:'تغيير حالة'};
  list.innerHTML = history_log.map(l => {
    const brCls = l.branch==='بريدة'?'bb-بريدة':l.branch==='عنيزة'?'bb-عنيزة':'bb-الكل';
    return `<div class="log-entry">
      <div class="log-dot ${l.action}"></div>
      <div class="log-body">
        <div class="log-top">
          <span class="lab lab-${l.action}">${amap[l.action]||l.action}</span>
          ${l.branch?`<span class="branch-badge ${brCls}" style="font-size:9px;padding:1px 7px">${l.branch}</span>`:''}
          <span class="log-ach">${l.achTitle}</span>
        </div>
        <div class="log-detail">${l.detail}</div>
        ${l.changeNote?`<div class="log-note">ملاحظة: ${l.changeNote}</div>`:''}
        <div class="log-time">${fmtDateTime(l.timestamp)}</div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════ DASHBOARD ═══════════
function updateDashboard() {
  const src   = branchFilter==='الكل' ? achievements : achievements.filter(a=>a.branch===branchFilter);
  const total = src.length;
  const done  = src.filter(a=>a.status==='مكتمل').length;
  const prog  = src.filter(a=>a.status==='جارٍ').length;
  const plan  = src.filter(a=>a.status==='مخطط').length;
  const hold  = src.filter(a=>a.status==='متوقف').length;

  document.getElementById('k-total').textContent = total;
  document.getElementById('k-done').textContent  = done;
  document.getElementById('k-prog').textContent  = prog;
  document.getElementById('k-plan').textContent  = plan;

  // ring
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('ringFill').style.strokeDashoffset = 289 - (289*pct/100);
  document.getElementById('ringPct').textContent = pct + '%';

  // bars
  const mx = Math.max(done,prog,plan,hold,1);
  ['done','prog','plan','hold'].forEach((k,i)=>{
    const v = [done,prog,plan,hold][i];
    document.getElementById('bar-'+k).style.width = (v/mx*100)+'%';
    document.getElementById('bc-'+k).textContent = v;
  });

  // branch KPI cards
  const grid = document.getElementById('branchKpiGrid');
  grid.innerHTML = branches.map(b => {
    const bs = achievements.filter(a=>a.branch===b);
    const bd = bs.filter(a=>a.status==='مكتمل').length;
    const bp = bs.filter(a=>a.status==='جارٍ').length;
    const bpn= bs.filter(a=>a.status==='مخطط').length;
    const bh = bs.filter(a=>a.status==='متوقف').length;
    const cls = b==='بريدة'?'buraydah':b==='عنيزة'?'unaizah':'';
    return `<div class="bkpi ${cls}">
      <div class="bkpi-name">${b} (${bs.length})</div>
      <div class="bkpi-row"><span class="bkpi-lbl">مكتمل</span><span class="bkpi-val" style="color:var(--green)">${bd}</span></div>
      <div class="bkpi-row"><span class="bkpi-lbl">جارٍ</span><span class="bkpi-val" style="color:var(--blue)">${bp}</span></div>
      <div class="bkpi-row"><span class="bkpi-lbl">مخطط</span><span class="bkpi-val" style="color:var(--purple)">${bpn}</span></div>
      <div class="bkpi-row"><span class="bkpi-lbl">متوقف</span><span class="bkpi-val" style="color:var(--amber)">${bh}</span></div>
    </div>`;
  }).join('');

  // recent
  const rec = [...src].sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)).slice(0,5);
  const recEl = document.getElementById('dashRecent');
  if (!rec.length) { recEl.innerHTML='<div class="empty-sub" style="text-align:center;padding:16px">لا توجد إنجازات</div>'; return; }
  const sColor = {مكتمل:'--green',جارٍ:'--blue',مخطط:'--purple',متوقف:'--amber'};
  recEl.innerHTML = rec.map(a=>`
    <div class="recent-item">
      <div class="recent-bar" style="background:var(${sColor[a.status]||'--slate'})"></div>
      <div class="recent-info">
        <div class="recent-title">${a.title}</div>
        <div class="recent-meta">${a.branch} — ${a.status} — ${fmtDate(a.updatedAt)}</div>
      </div>
      <span class="branch-badge ${a.branch==='بريدة'?'bb-بريدة':a.branch==='عنيزة'?'bb-عنيزة':'bb-الكل'}">${a.branch}</span>
    </div>`).join('');
}

// ═══════════ GAS SYNC ═══════════
async function syncGAS(item, isNew) {
  if (!GAS_URL || GAS_URL==='YOUR_GAS_URL_HERE') return;
  try { await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:isNew?'addMaintAch':'updateMaintAch',data:item})}); } catch(e){}
}

// ═══════════ HELPERS ═══════════
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('ar-SA',{year:'numeric',month:'short',day:'numeric'}).replace(/\u200f/g,'');
}
function fmtDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return fmtDate(iso) + ' — ' + d.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
}
let tTmr;
function showToast(msg, type='ok') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+type;
  clearTimeout(tTmr); tTmr=setTimeout(()=>t.classList.remove('show'),2600);
}
</script>
