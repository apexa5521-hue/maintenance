<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230F172A'/><rect x='7' y='7' width='7' height='7' rx='1.5' fill='%2338BDF8'/><rect x='18' y='7' width='7' height='7' rx='1.5' fill='%2338BDF8'/><rect x='7' y='18' width='7' height='7' rx='1.5' fill='%2338BDF8'/><rect x='18' y='18' width='7' height='7' rx='1.5' fill='white'/></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تسجيل مهمة — APEXCARE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Tajawal:wght@300;400;500;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --void:#080C14; --deep:#0D1424; --surface:#111827; --panel:#161E2E;
  --raised:#1C2840; --rim:#243047; --muted:#2D3A52; --ghost:rgba(255,255,255,.06);
  --sky:#38BDF8; --sky-dim:rgba(56,189,248,.15); --sky-glow:rgba(56,189,248,.35);
  --lime:#A3E635; --rose:#FB7185; --amber:#FCD34D; --violet:#A78BFA; --emerald:#34D399;
  --text-1:#F1F5F9; --text-2:#94A3B8; --text-3:#4B5563;
  --done-c:#34D399; --done-bg:rgba(52,211,153,.12); --done-rim:rgba(52,211,153,.3);
  --prog-c:#38BDF8; --prog-bg:rgba(56,189,248,.12); --prog-rim:rgba(56,189,248,.3);
  --plan-c:#A78BFA; --plan-bg:rgba(167,139,250,.12); --plan-rim:rgba(167,139,250,.3);
  --hold-c:#FCD34D; --hold-bg:rgba(252,211,77,.12);  --hold-rim:rgba(252,211,77,.3);
  --font-d:'Syne',sans-serif; --font-b:'Tajawal',sans-serif; --mono:'JetBrains Mono',monospace;
  --r:12px; --r2:8px; --tr:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-b);background:var(--void);color:var(--text-1);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");opacity:.4;}
.amb{position:fixed;pointer-events:none;border-radius:50%;filter:blur(120px);z-index:0;animation:drift 12s ease-in-out infinite;}
.a1{width:560px;height:560px;background:rgba(56,189,248,.18);top:-180px;right:-180px;}
.a2{width:420px;height:420px;background:rgba(167,139,250,.14);bottom:-120px;left:-120px;animation-delay:-5s;}
.a3{width:300px;height:300px;background:rgba(52,211,153,.1);top:40%;left:40%;animation-delay:-3s;}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,15px)}}
.wrap{position:relative;z-index:1;}

/* HEADER */
.hdr{background:rgba(8,12,20,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--rim);border-bottom:1px solid rgba(56,189,248,.2);position:sticky;top:0;z-index:100;padding:0 18px;}
.hdr-in{max-width:520px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--sky),var(--violet));border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--sky-glow),0 0 40px rgba(167,139,250,.2);}
.hdr-logo svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2.3;}
.hdr-name{font-family:var(--font-d);font-size:14px;font-weight:700;color:var(--text-1);}
.hdr-sub{font-size:10px;color:var(--text-3);letter-spacing:.4px;}
.hdr-date{font-family:var(--mono);font-size:10px;color:var(--text-3);background:var(--panel);border:1px solid var(--rim);padding:4px 10px;border-radius:99px;}

/* TABS */
.tabs{background:rgba(13,20,36,.7);backdrop-filter:blur(10px);border-bottom:1px solid var(--rim);}
.tabs-in{max-width:520px;margin:0 auto;display:flex;padding:0 18px;}
.tab{flex:1;padding:12px 8px;border:none;background:transparent;font-family:var(--font-b);font-size:13px;font-weight:500;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap;text-align:center;}
.tab.on{color:var(--sky);border-bottom-color:var(--sky);font-weight:700;text-shadow:0 0 20px var(--sky-glow);}

/* MAIN */
.main{max-width:520px;margin:0 auto;padding:20px 18px 80px;}
.panel{display:none;}
.panel.on{display:block;animation:pi .25s var(--tr);}
@keyframes pi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* FORM PAGE */
.form-hero{margin-bottom:20px;}
.form-hero-t span{
  background:linear-gradient(135deg,var(--sky),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.form-hero-t{font-family:var(--font-d);font-size:20px;font-weight:800;color:var(--text-1);margin-bottom:3px;}
.form-hero-t span{color:var(--sky);}
.form-hero-s{font-size:12px;color:var(--text-3);}

/* CARD */
.card{background:var(--panel);border:1px solid var(--rim);border-radius:var(--r);padding:16px;margin-bottom:12px;transition:all .2s;}
.card:focus-within{border-color:var(--sky);}
.card-lbl{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px;}

/* FIELD */
.field{margin-bottom:14px;}
.f-lbl{display:block;font-size:11px;font-weight:700;color:var(--text-3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.req{color:var(--rose);}
input[type=text],input[type=date],textarea{width:100%;padding:10px 12px;background:var(--raised);border:1px solid var(--rim);border-radius:var(--r2);font-family:var(--font-b);font-size:13px;color:var(--text-1);outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;}
input::placeholder,textarea::placeholder{color:var(--text-3);}
input:focus,textarea:focus{border-color:var(--sky);box-shadow:0 0 0 3px var(--sky-dim);}
textarea{resize:vertical;min-height:80px;line-height:1.7;}
.char-c{font-size:9px;color:var(--text-3);text-align:left;margin-top:3px;font-family:var(--mono);}

/* BRANCH GRID */
.b-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:7px;}
.b-opt{padding:10px 8px;border:1px solid var(--rim);border-radius:var(--r2);font-family:var(--font-b);font-size:12px;font-weight:600;color:var(--text-3);background:var(--ghost);cursor:pointer;text-align:center;transition:all .15s var(--tr);}
.b-opt.sel-بريدة{border-color:var(--sky-glow);background:var(--sky-dim);color:var(--sky);box-shadow:0 0 16px var(--sky-dim),inset 0 1px 0 rgba(56,189,248,.2);}
.b-opt.sel-عنيزة{border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.12);color:var(--violet);box-shadow:0 0 16px rgba(167,139,250,.15),inset 0 1px 0 rgba(167,139,250,.2);}
.b-opt.sel-other{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:var(--text-1);}

/* STATUS GRID */
.s-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.s-opt{padding:12px 8px;border:1px solid var(--rim);border-radius:var(--r2);font-family:var(--font-b);font-size:13px;font-weight:700;color:var(--text-3);background:var(--ghost);cursor:pointer;text-align:center;transition:all .16s var(--tr);}
.s-opt small{display:block;font-size:10px;font-weight:400;margin-top:2px;opacity:.6;}
.s-opt.sel-مكتمل{border-color:var(--done-rim);background:var(--done-bg);color:var(--emerald);box-shadow:0 0 16px rgba(52,211,153,.15);}
.s-opt.sel-جارٍ  {border-color:var(--prog-rim);background:var(--prog-bg);color:var(--sky);box-shadow:0 0 16px var(--sky-dim);}
.s-opt.sel-مخطط  {border-color:var(--plan-rim);background:var(--plan-bg);color:var(--violet);box-shadow:0 0 16px rgba(167,139,250,.15);}
.s-opt.sel-متوقف {border-color:var(--hold-rim);background:var(--hold-bg);color:var(--amber);box-shadow:0 0 16px rgba(252,211,77,.12);}
.stop-panel{max-height:0;overflow:hidden;transition:max-height .3s var(--tr),opacity .3s;opacity:0;margin-top:0;}
.stop-panel.show{max-height:220px;opacity:1;margin-top:12px;}
.stop-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.sc{padding:5px 12px;border:1px solid var(--rim);border-radius:99px;font-family:var(--font-b);font-size:10px;font-weight:600;color:var(--text-3);background:var(--ghost);cursor:pointer;transition:all .14s;}
.sc.active{border-color:var(--hold-rim);background:var(--hold-bg);color:var(--amber);}

/* PROGRESS */
.prog-card{background:var(--panel);border:1px solid var(--rim);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.prog-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.prog-title{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.7px;}
.prog-num{font-family:var(--mono);font-size:32px;font-weight:600;color:var(--sky);line-height:1;}
.prog-track{position:relative;height:10px;background:var(--raised);border-radius:99px;margin-bottom:10px;overflow:visible;}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--sky),#7DD3FC);position:relative;transition:width .25s var(--tr);}
.prog-thumb{position:absolute;left:0;top:50%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;background:var(--deep);border:3px solid var(--sky);box-shadow:0 0 12px var(--sky-glow);pointer-events:none;transition:left .25s var(--tr);}
input[type=range].r-custom{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;margin:0;padding:0;}
.prog-labels{display:flex;justify-content:space-between;margin-bottom:10px;}
.prog-lbl{font-family:var(--mono);font-size:9px;color:var(--text-3);}
.ms-row{display:flex;justify-content:space-between;}
.ms-btn{padding:4px 9px;border:1px solid var(--rim);border-radius:99px;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text-3);background:var(--ghost);cursor:pointer;transition:all .14s;}
.ms-btn:hover,.ms-btn.on{border-color:var(--sky-glow);background:var(--sky-dim);color:var(--sky);}

/* SUBMIT */
.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--sky),var(--violet));color:#fff;border:none;border-radius:var(--r);font-family:var(--font-b);font-size:14px;font-weight:800;cursor:pointer;transition:all .2s var(--tr);box-shadow:0 0 24px var(--sky-glow),0 0 40px rgba(167,139,250,.15);letter-spacing:.3px;margin-bottom:4px;position:relative;overflow:hidden;}
.btn-submit:hover{background:#7DD3FC;transform:translateY(-2px);box-shadow:0 0 30px var(--sky-glow);}
.btn-submit:active{transform:translateY(0);}
.btn-submit:disabled{opacity:.5;pointer-events:none;}

/* SUCCESS */
.success{display:none;text-align:center;padding:36px 16px;}
.success.show{display:block;animation:pi .3s var(--tr);}
.suc-ring{width:72px;height:72px;border-radius:50%;background:var(--done-bg);border:2px solid var(--done-rim);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 0 30px var(--done-rim),0 0 60px rgba(52,211,153,.1);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 24px var(--done-rim)}50%{box-shadow:0 0 40px rgba(52,211,153,.4),0 0 70px rgba(52,211,153,.15);}}
.suc-ring svg{width:32px;height:32px;stroke:var(--emerald);fill:none;stroke-width:2.5;}
.suc-title{font-family:var(--font-d);font-size:20px;font-weight:800;color:var(--text-1);margin-bottom:6px;}
.suc-sub{font-size:12px;color:var(--text-3);margin-bottom:20px;}
.suc-summary{background:var(--panel);border:1px solid var(--rim);border-radius:var(--r);padding:14px;text-align:right;margin-bottom:16px;}
.ss-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--rim);}
.ss-row:last-child{border-bottom:none;}
.ss-k{font-size:10px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.ss-v{font-size:12px;font-weight:700;color:var(--text-1);font-family:var(--mono);}
.btn-new{width:100%;padding:12px;background:var(--ghost);border:1px solid var(--rim);border-radius:var(--r2);font-family:var(--font-b);font-size:13px;font-weight:700;color:var(--text-2);cursor:pointer;transition:all .14s;}
.btn-new:hover{background:var(--raised);color:var(--text-1);}

/* MY TASKS */
.tasks-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.tasks-t{font-family:var(--font-d);font-size:16px;font-weight:800;color:var(--text-1);}
.tasks-cnt{font-family:var(--mono);font-size:10px;background:var(--sky-dim);color:var(--sky);border:1px solid var(--sky-glow);padding:2px 8px;border-radius:99px;}
.tf-row{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.tf-row::-webkit-scrollbar{display:none;}
.tfchip{flex-shrink:0;padding:5px 12px;border:1px solid var(--rim);border-radius:99px;font-family:var(--font-b);font-size:10px;font-weight:600;color:var(--text-3);background:var(--ghost);cursor:pointer;transition:all .14s;}
.tfchip.on{border-color:var(--sky-glow);background:var(--sky-dim);color:var(--sky);}
.sort-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sort-lbl{font-size:10px;color:var(--text-3);font-weight:600;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;}
.sort-sel{flex:1;padding:6px 10px;background:var(--panel);border:1px solid var(--rim);border-radius:var(--r2);font-family:var(--font-b);font-size:11px;color:var(--text-1);outline:none;cursor:pointer;-webkit-appearance:none;}
.sort-sel option{background:var(--surface);}

/* TASK CARD */
.tc{background:var(--panel);border:1px solid var(--rim);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:all .2s var(--tr);animation:pi .3s var(--tr) both;}
.tc:hover{border-color:var(--muted);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.35);}
.tc:has(.tcb-مكتمل):hover{box-shadow:0 6px 20px rgba(52,211,153,.15),0 2px 8px rgba(0,0,0,.2);}
.tc:has(.tcb-جارٍ):hover  {box-shadow:0 6px 20px var(--sky-dim),0 2px 8px rgba(0,0,0,.2);}
.tc:has(.tcb-مخطط):hover  {box-shadow:0 6px 20px rgba(167,139,250,.15),0 2px 8px rgba(0,0,0,.2);}
.tc:has(.tcb-متوقف):hover  {box-shadow:0 6px 20px rgba(252,211,77,.12),0 2px 8px rgba(0,0,0,.2);}
.tc-in{display:flex;}
.tc-bar{width:3px;flex-shrink:0;}
.tcb-مكتمل{background:var(--emerald)} .tcb-جارٍ{background:var(--sky)}
.tcb-مخطط {background:var(--violet)}  .tcb-متوقف{background:var(--amber)}
.tc-body{flex:1;padding:12px 13px 9px;min-width:0;}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;margin-bottom:5px;}
.tc-title{font-size:13px;font-weight:700;color:var(--text-1);line-height:1.4;}
.tc-bgs{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;}
.tbg{font-size:9px;font-weight:700;padding:2px 8px;border-radius:99px;border:1px solid;white-space:nowrap;}
.tbs-مكتمل{color:var(--emerald);background:var(--done-bg);border-color:var(--done-rim);}
.tbs-جارٍ  {color:var(--sky);   background:var(--prog-bg);border-color:var(--prog-rim);}
.tbs-مخطط  {color:var(--violet);background:var(--plan-bg);border-color:var(--plan-rim);}
.tbs-متوقف {color:var(--amber); background:var(--hold-bg);border-color:var(--hold-rim);}
.tbr-brd{color:var(--sky);   background:var(--sky-dim);          border-color:var(--sky-glow);}
.tbr-unz{color:var(--violet);background:rgba(167,139,250,.12);   border-color:rgba(167,139,250,.3);}
.tbr-oth{color:var(--text-2);background:var(--ghost);            border-color:var(--rim);}
.tc-desc{font-size:11px;color:var(--text-3);line-height:1.6;margin-bottom:6px;}
.tc-stop{font-size:10px;color:var(--amber);margin-bottom:5px;}
.tc-prog{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.tc-ptrk{flex:1;height:3px;background:var(--raised);border-radius:99px;overflow:hidden;}
.tc-pfll{height:100%;border-radius:99px;transition:width .6s var(--tr);}
.pf-مكتمل{background:var(--emerald)} .pf-جارٍ{background:var(--sky)}
.pf-مخطط {background:var(--violet)}  .pf-متوقف{background:var(--amber)}
.tc-ppct{font-family:var(--mono);font-size:9px;color:var(--text-3);width:26px;text-align:left;}
.tc-dates{display:flex;gap:10px;flex-wrap:wrap;}
.tc-di{font-size:9px;color:var(--text-3);}
.tc-di strong{color:var(--text-2);}
.tc-deadline{padding:5px 13px;font-size:9px;font-weight:700;border-top:1px solid var(--rim);}
.dl-late {color:var(--rose);  background:rgba(251,113,133,.08);}
.dl-today{color:var(--amber); background:rgba(252,211,77,.08);}
.dl-soon {color:var(--sky);   background:var(--sky-dim);}
.dl-ok   {color:var(--emerald);background:var(--done-bg);}
.tc-acts{border-top:1px solid var(--rim);display:flex;}
.tca{flex:1;padding:8px;border:none;background:transparent;font-family:var(--font-b);font-size:11px;font-weight:600;color:var(--text-3);cursor:pointer;transition:all .13s;}
.tca:hover{background:var(--ghost);color:var(--text-1);}
.tca.red:hover{background:rgba(251,113,133,.1);color:var(--rose);}
.tca+.tca{border-right:1px solid var(--rim);}
.empty-tc{text-align:center;padding:40px 16px;color:var(--text-3);}
.empty-tc-i{font-size:32px;margin-bottom:10px;}

/* EDIT OVERLAY */
.edit-ov{position:fixed;inset:0;background:rgba(8,12,20,.75);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.edit-ov.open{display:flex;animation:eoi .2s ease;}
@keyframes eoi{from{opacity:0}to{opacity:1}}
.edit-drawer{background:var(--deep);border:1px solid var(--rim);border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;animation:edi .26s cubic-bezier(.32,.72,0,1);overscroll-behavior:contain;}
@keyframes edi{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ed-handle{width:40px;height:4px;background:var(--muted);border-radius:99px;margin:10px auto 0;}
.ed-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 18px 11px;border-bottom:1px solid var(--rim);position:sticky;top:0;background:var(--deep);z-index:1;}
.ed-title{font-family:var(--font-d);font-size:14px;font-weight:700;}
.ed-close{width:28px;height:28px;border:1px solid var(--rim);border-radius:6px;background:var(--ghost);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-3);transition:all .13s;}
.ed-close:hover{background:rgba(251,113,133,.15);color:var(--rose);}
.ed-body{padding:16px 18px;}

/* DELETE BAR */
.del-bar{position:fixed;bottom:0;left:0;right:0;background:var(--deep);border-top:1px solid rgba(251,113,133,.3);padding:14px 20px;display:none;align-items:center;justify-content:space-between;gap:10px;z-index:300;}
.del-bar.open{display:flex;animation:dbi .2s ease;}
@keyframes dbi{from{transform:translateY(100%)}to{transform:translateY(0)}}
.del-msg{font-size:12px;font-weight:700;color:var(--rose);}
.del-btns{display:flex;gap:6px;}
.dcbtn{padding:8px 16px;border:none;border-radius:var(--r2);font-family:var(--font-b);font-size:12px;font-weight:700;cursor:pointer;}
.dcbtn-y{background:var(--rose);color:#fff;}
.dcbtn-n{background:var(--ghost);color:var(--text-2);border:1px solid var(--rim);}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--raised);color:var(--text-1);border:1px solid var(--rim);padding:9px 18px;border-radius:var(--r2);font-size:12px;font-weight:600;opacity:0;transition:all .22s var(--tr);z-index:999;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok {background:rgba(52,211,153,.2);border-color:var(--done-rim);color:var(--emerald);}
.toast.err{background:rgba(251,113,133,.2);border-color:rgba(251,113,133,.3);color:var(--rose);}
@media(max-width:420px){.tc-top{flex-direction:column;gap:4px}.tc-bgs{justify-content:flex-start}}

/* ── THEME TOGGLE ── */
body.light {
  --void:    #F0F4FF; --deep:    #E8EFFE; --surface: #FFFFFF;
  --panel:   #FFFFFF; --raised:  #F0F4FF; --rim:     #D1D9F0;
  --muted:   #B8C4E8; --ghost:   rgba(37,99,235,.05);
  --sky-dim: rgba(37,99,235,.1); --sky-glow:rgba(37,99,235,.25);
  --sky:     #2563EB; --emerald: #16A34A; --violet:  #7C3AED;
  --amber:   #D97706; --rose:    #DC2626;
  --text-1:  #0F172A; --text-2:  #334155; --text-3:  #64748B;
  --done-bg: rgba(22,163,74,.08);   --done-rim: rgba(22,163,74,.25);
  --prog-bg: rgba(37,99,235,.08);   --prog-rim: rgba(37,99,235,.25);
  --plan-bg: rgba(124,58,237,.08);  --plan-rim: rgba(124,58,237,.25);
  --hold-bg: rgba(217,119,6,.08);   --hold-rim: rgba(217,119,6,.25);
}
body.light .amb { opacity:.15; }
body.light .a1{background:rgba(37,99,235,.12);}
body.light .a2{background:rgba(124,58,237,.1);}
body.light .a3{background:rgba(22,163,74,.08);}
body.light .hdr  { background:rgba(240,244,255,.92)!important; border-bottom-color:rgba(37,99,235,.2)!important; }
body.light .tabs { background:rgba(232,239,254,.9)!important; }
body.light .edit-drawer,.light .edit-ov .edit-drawer { background:#FFFFFF; }
body.light input[type=text],body.light input[type=date],body.light textarea,body.light select { background:#F8FAFF; color:#0F172A; border-color:#D1D9F0; }
.theme-btn {
  width:34px; height:34px; border:1px solid var(--rim); border-radius:8px;
  background:var(--ghost); cursor:pointer; display:flex; align-items:center;
  justify-content:center; font-size:15px; transition:all .18s; flex-shrink:0;
  color:var(--text-2);
}
.theme-btn:hover { background:var(--raised); border-color:var(--muted); }
</style>
</head>
<body>
<div class="amb a1"></div>
<div class="amb a2"></div>
<div class="amb a3"></div>
<div class="wrap">

<header class="hdr">
  <div class="hdr-in">
    <div class="hdr-brand">
      <div class="hdr-logo"><svg viewBox="0 0 24 24"><path d="M11 4H4a1 1 0 00-1 1v14a1 1 0 001 1h14a1 1 0 001-1v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
      <div><div class="hdr-name">تسجيل مهمة</div><div class="hdr-sub">قسم الصيانة والتشغيل · APEXCARE</div></div>
    </div>
    <div class="hdr-date" id="hDate">—</div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
  </div>
</header>

<div class="tabs">
  <div class="tabs-in">
    <button class="tab on" data-p="form"  onclick="switchTab(this,'form')">تسجيل مهمة</button>
    <button class="tab"    data-p="tasks" onclick="switchTab(this,'tasks')">مهامي <span id="tasksTabCnt" style="font-family:var(--mono);font-size:10px;opacity:.6"></span></button>
  </div>
</div>

<div class="main">

  <!-- ════ FORM ════ -->
  <div class="panel on" id="panel-form">

    <div id="formView">
      <div class="form-hero">
        <div class="form-hero-t">الأعمال <span>الموكلة</span></div>
        <div class="form-hero-s">سجّل مهمتك — قسم الصيانة والتشغيل</div>
      </div>

      <div class="card">
        <div class="card-lbl">تفاصيل المهمة</div>
        <div class="field">
          <label class="f-lbl"><span class="req">*</span> عنوان المهمة</label>
          <input type="text" id="f-title" placeholder="مثال: صيانة ضاغط الهواء في وحدة الأسنان" maxlength="120"
            oninput="document.getElementById('f-tc').textContent=this.value.length+'/120'">
          <div class="char-c" id="f-tc">0/120</div>
        </div>
        <div class="field" style="margin-bottom:0">
          <label class="f-lbl">الوصف <span style="opacity:.5;text-transform:none;font-weight:400">(اختياري)</span></label>
          <textarea id="f-desc" placeholder="أي تفاصيل إضافية..." rows="3"></textarea>
        </div>
      </div>

      <div class="card">
        <div class="card-lbl">الفرع</div>
        <div class="b-grid" id="brGrid"></div>
      </div>

      <div class="card">
        <div class="card-lbl">الحالة</div>
        <div class="s-grid">
          <button class="s-opt" data-s="مخطط"  onclick="selS(this,'f')">مخطط<small>لم تبدأ بعد</small></button>
          <button class="s-opt" data-s="جارٍ"  onclick="selS(this,'f')">جارٍ<small>قيد التنفيذ</small></button>
          <button class="s-opt" data-s="مكتمل" onclick="selS(this,'f')">مكتمل<small>تم الإنجاز</small></button>
          <button class="s-opt" data-s="متوقف" onclick="selS(this,'f')">متوقف<small>موقوف مؤقتاً</small></button>
        </div>
        <div class="stop-panel" id="f-stop-panel">
          <label class="f-lbl" style="color:var(--amber)">سبب التوقف</label>
          <div class="stop-chips" id="f-stop-chips">
            <button class="sc" onclick="selSc(this,'f')">انتظار قطع غيار</button>
            <button class="sc" onclick="selSc(this,'f')">انتظار موافقة</button>
            <button class="sc" onclick="selSc(this,'f')">جدولة مؤجلة</button>
            <button class="sc" onclick="selSc(this,'f')">مشكلة تقنية</button>
            <button class="sc" onclick="selSc(this,'f')">نقص عمالة</button>
            <button class="sc" onclick="selSc(this,'f')">أخرى</button>
          </div>
          <input type="text" id="f-stop" placeholder="أو اكتب السبب...">
        </div>
      </div>



      <div class="card">
        <div class="card-lbl">التواريخ</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="field" style="margin-bottom:0"><label class="f-lbl">تاريخ البدء</label><input type="date" id="f-start"></div>
          <div class="field" style="margin-bottom:0"><label class="f-lbl">تاريخ الاكتمال</label><input type="date" id="f-end"></div>
        </div>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="submitTask()">تسجيل المهمة</button>
    </div>

    <div class="success" id="successView">
      <div class="suc-ring"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="suc-title">تم التسجيل</div>
      <div class="suc-sub">تمت إضافة المهمة وستظهر في قائمة مهامك</div>
      <div class="suc-summary" id="sucSum"></div>
      <button class="btn-new" onclick="resetForm()">تسجيل مهمة جديدة</button>
    </div>
  </div>

  <!-- ════ MY TASKS ════ -->
  <div class="panel" id="panel-tasks">
    <div class="tasks-hdr">
      <div class="tasks-t">مهامي</div>
      <span class="tasks-cnt" id="tasksCnt">0</span>
    </div>
    <div class="tf-row">
      <button class="tfchip on" data-f="all"   onclick="setTF(this,'all')">الكل</button>
      <button class="tfchip"    data-f="مكتمل"  onclick="setTF(this,'مكتمل')">مكتمل</button>
      <button class="tfchip"    data-f="جارٍ"   onclick="setTF(this,'جارٍ')">جارٍ</button>
      <button class="tfchip"    data-f="مخطط"   onclick="setTF(this,'مخطط')">مخطط</button>
      <button class="tfchip"    data-f="متوقف"  onclick="setTF(this,'متوقف')">متوقف</button>
    </div>
    <div class="sort-row">
      <span class="sort-lbl">ترتيب</span>
      <select class="sort-sel" id="sortSel" onchange="renderTasks()">
        <option value="date-desc">الأحدث</option>
        <option value="date-asc">الأقدم</option>
        <option value="end-asc">موعد الاكتمال</option>
        <option value="status">الحالة</option>
        <option value="prog-desc">نسبة الإنجاز</option>
      </select>
    </div>
    <div id="tasksList"></div>
  </div>

</div>
</div>

<!-- EDIT OVERLAY -->
<div class="edit-ov" id="editOv" onclick="if(event.target===this)closeEdit()">
  <div class="edit-drawer">
    <div class="ed-handle"></div>
    <div class="ed-hdr">
      <div class="ed-title">تعديل المهمة</div>
      <button class="ed-close" onclick="closeEdit()">✕</button>
    </div>
    <div class="ed-body">
      <input type="hidden" id="e-id">
      <div class="field"><label class="f-lbl"><span class="req">*</span> العنوان</label><input type="text" id="e-title"></div>
      <div class="field"><label class="f-lbl">الوصف</label><textarea id="e-desc" rows="3"></textarea></div>
      <div class="field">
        <label class="f-lbl"><span class="req">*</span> الفرع</label>
        <div class="b-grid" id="e-brGrid"></div>
      </div>
      <div class="field">
        <label class="f-lbl"><span class="req">*</span> الحالة</label>
        <div class="s-grid">
          <button class="s-opt" data-s="مخطط"  onclick="selS(this,'e')">مخطط<small>لم تبدأ</small></button>
          <button class="s-opt" data-s="جارٍ"  onclick="selS(this,'e')">جارٍ<small>قيد التنفيذ</small></button>
          <button class="s-opt" data-s="مكتمل" onclick="selS(this,'e')">مكتمل<small>تم الإنجاز</small></button>
          <button class="s-opt" data-s="متوقف" onclick="selS(this,'e')">متوقف<small>موقوف</small></button>
        </div>
        <div class="stop-panel" id="e-stop-panel" style="margin-top:10px">
          <label class="f-lbl" style="color:var(--amber);margin-top:10px">سبب التوقف</label>
          <div class="stop-chips" id="e-stop-chips">
            <button class="sc" onclick="selSc(this,'e')">انتظار قطع غيار</button>
            <button class="sc" onclick="selSc(this,'e')">انتظار موافقة</button>
            <button class="sc" onclick="selSc(this,'e')">جدولة مؤجلة</button>
            <button class="sc" onclick="selSc(this,'e')">مشكلة تقنية</button>
            <button class="sc" onclick="selSc(this,'e')">نقص عمالة</button>
            <button class="sc" onclick="selSc(this,'e')">أخرى</button>
          </div>
          <input type="text" id="e-stop" placeholder="سبب التوقف...">
        </div>
      </div>
      <div class="prog-card" style="margin-bottom:12px">
        <div class="prog-top"><div class="prog-title">نسبة الإنجاز</div><div class="prog-num" id="e-pnum">0%</div></div>
        <div class="prog-track">
          <div class="prog-fill" id="e-pfill" style="width:0%"><div class="prog-thumb"></div></div>
          <input type="range" class="r-custom" id="e-prog" min="0" max="100" value="0" oninput="updP('e',this.value)">
        </div>
        <div class="prog-labels"><span class="prog-lbl">0%</span><span class="prog-lbl">25%</span><span class="prog-lbl">50%</span><span class="prog-lbl">75%</span><span class="prog-lbl">100%</span></div>
        <div class="ms-row">
          <button class="ms-btn" onclick="setMs('e',0)">0%</button>
          <button class="ms-btn" onclick="setMs('e',25)">25%</button>
          <button class="ms-btn" onclick="setMs('e',50)">50%</button>
          <button class="ms-btn" onclick="setMs('e',75)">75%</button>
          <button class="ms-btn" onclick="setMs('e',100)">100%</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div class="field" style="margin-bottom:0"><label class="f-lbl">تاريخ البدء</label><input type="date" id="e-start"></div>
        <div class="field" style="margin-bottom:0"><label class="f-lbl">تاريخ الاكتمال</label><input type="date" id="e-end"></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-submit" style="padding:11px;font-size:13px" onclick="saveEdit()">حفظ التعديلات</button>
        <button style="padding:11px 16px;background:var(--ghost);border:1px solid var(--rim);border-radius:var(--r2);font-family:var(--font-b);font-size:13px;font-weight:600;color:var(--text-2);cursor:pointer" onclick="closeEdit()">إلغاء</button>
      </div>
    </div>
  </div>
</div>

<!-- DELETE BAR -->
<div class="del-bar" id="delBar">
  <span class="del-msg">تأكيد حذف هذه المهمة نهائياً؟</span>
  <div class="del-btns">
    <button class="dcbtn dcbtn-n" onclick="cancelDel()">إلغاء</button>
    <button class="dcbtn dcbtn-y" onclick="confirmDel()">حذف</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbxm1QkCIKCL7LySR7aIJV0X8uxuOH70F8oHaWhjFSnyBqTC0xUShnfnyPXrDR5YTc77/exec';
const SK_ACH='apx_m_ach', SK_LOG='apx_m_log', SK_BR='apx_m_br';

let branches=['بريدة','عنيزة'];
let fStatus=null, fBranch=null, eStatus=null, eBranch=null;
let editingId=null, deletingId=null, tfFilter='all';

document.addEventListener('DOMContentLoaded',()=>{
  updateDate(); loadBranches(); renderBrGrid(); renderEBrGrid();
  document.getElementById('f-start').value=today();
  initTheme();
  renderTasks(); updateTabCount();
});

function today(){return new Date().toISOString().split('T')[0];}
function updateDate(){document.getElementById('hDate').textContent=new Date().toLocaleDateString('ar-SA',{weekday:'short',month:'short',day:'numeric'}).replace(/\u200f/g,'');}
function loadBranches(){try{const b=JSON.parse(localStorage.getItem(SK_BR)||'["بريدة","عنيزة"]');branches=[...new Set(['بريدة','عنيزة',...b])];}catch(e){}}

// TABS
function switchTab(btn,p){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('panel-'+p)?.classList.add('on');
  if(p==='tasks')renderTasks();
}
function updateTabCount(){
  const t=getTasks(); document.getElementById('tasksTabCnt').textContent=t.length?`(${t.length})`:'';
  document.getElementById('tasksCnt').textContent=t.length;
}

// BRANCH GRIDS
function renderBrGrid(){
  document.getElementById('brGrid').innerHTML=branches.map(b=>`<button class="b-opt" data-b="${b}" onclick="selBranch(this,'${b}','f')">${b}</button>`).join('');
}
function renderEBrGrid(){
  document.getElementById('e-brGrid').innerHTML=branches.map(b=>`<button class="b-opt" data-b="${b}" onclick="selBranch(this,'${b}','e')">${b}</button>`).join('');
}
function selBranch(btn,val,pfx){
  const grid=document.getElementById(pfx==='f'?'brGrid':'e-brGrid');
  grid.querySelectorAll('.b-opt').forEach(b=>b.className='b-opt');
  btn.classList.add('sel-'+(val==='بريدة'?'بريدة':val==='عنيزة'?'عنيزة':'other'));
  if(pfx==='f')fBranch=val; else eBranch=val;
}

// STATUS
function selS(btn,pfx){
  const ctx=pfx==='f'?'#panel-form .s-grid':'#editOv .s-grid';
  document.querySelectorAll(`${ctx} .s-opt`).forEach(b=>b.className='s-opt');
  btn.classList.add('sel-'+btn.dataset.s);
  if(pfx==='f'){fStatus=btn.dataset.s; document.getElementById('f-stop-panel').classList.toggle('show',btn.dataset.s==='متوقف');}
  else{eStatus=btn.dataset.s; document.getElementById('e-stop-panel').classList.toggle('show',btn.dataset.s==='متوقف');}
  // auto-progress only in edit drawer
  if(pfx==='e'){
    if(btn.dataset.s==='مكتمل')updP('e',100);
    if(btn.dataset.s==='مخطط') updP('e',0);
  }
}
function selSc(chip,pfx){
  document.querySelectorAll(`#${pfx}-stop-chips .sc`).forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  document.getElementById(pfx+'-stop').value=chip.textContent==='أخرى'?'':chip.textContent;
}

// PROGRESS
function updP(pfx,val){
  val=parseInt(val);
  document.getElementById(pfx+'-prog').value=val;
  document.getElementById(pfx+'-pnum').textContent=val+'%';
  document.getElementById(pfx+'-pfill').style.width=val+'%';
  document.querySelectorAll(`#${pfx==='f'?'panel-form':'editOv'} .ms-btn`).forEach(b=>{
    b.classList.toggle('on',parseInt(b.textContent)===val);
  });
  const f=document.getElementById(pfx+'-pfill');
  f.style.background=val===100?'linear-gradient(90deg,var(--emerald),#6EE7B7)':
    val>=75?'linear-gradient(90deg,var(--sky),#7DD3FC)':
    val>=50?'linear-gradient(90deg,var(--violet),#C4B5FD)':
    'linear-gradient(90deg,var(--muted),#4B5563)';
}
function setMs(pfx,val){updP(pfx,val);}

// SUBMIT
function submitTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){showToast('أدخل عنوان المهمة','err');return;}
  if(!fBranch){showToast('اختر الفرع','err');return;}
  if(!fStatus){showToast('اختر الحالة','err');return;}
  const sr=fStatus==='متوقف'?document.getElementById('f-stop').value.trim():'';
  if(fStatus==='متوقف'&&!sr){showToast('أدخل سبب التوقف','err');return;}

  const btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='جارٍ التسجيل...';

  const now=new Date().toISOString();
  const item={id:'t_'+Date.now(), title, branch:fBranch,
    desc:document.getElementById('f-desc').value.trim(), status:fStatus,
    progress: fStatus==='مكتمل' ? 100 : fStatus==='مخطط' ? 0 : 50,
    stopReason:sr, start:document.getElementById('f-start').value,
    end:document.getElementById('f-end').value, createdAt:now, updatedAt:now};

  saveItem(item);
  syncGAS(item,true);
  showSuccess(item);
  btn.disabled=false; btn.textContent='تسجيل المهمة';
}

function saveItem(item){
  try{
    const tasks=getTasks(); tasks.unshift(item);
    localStorage.setItem(SK_ACH,JSON.stringify(tasks));
    const logs=JSON.parse(localStorage.getItem(SK_LOG)||'[]');
    logs.unshift({id:'l_'+Date.now(),achId:item.id,achTitle:item.title,branch:item.branch,
      action:'add',detail:`تسجيل مهمة في فرع ${item.branch} — الحالة: ${item.status}`,
      changeNote:'',timestamp:item.createdAt});
    localStorage.setItem(SK_LOG,JSON.stringify(logs.slice(0,300)));
    updateTabCount();
  }catch(e){}
}

function showSuccess(item){
  document.getElementById('formView').style.display='none';
  document.getElementById('successView').classList.add('show');
  const sc={مكتمل:'var(--emerald)',جارٍ:'var(--sky)',مخطط:'var(--violet)',متوقف:'var(--amber)'};
  document.getElementById('sucSum').innerHTML=`
    <div class="ss-row"><span class="ss-k">المهمة</span><span class="ss-v">${item.title}</span></div>
    <div class="ss-row"><span class="ss-k">الفرع</span><span class="ss-v">${item.branch}</span></div>
    <div class="ss-row"><span class="ss-k">الحالة</span><span class="ss-v" style="color:${sc[item.status]||'inherit'}">${item.status}</span></div>
    <div class="ss-row"><span class="ss-k">الإنجاز</span><span class="ss-v" style="color:var(--sky)">${item.progress}%</span></div>
    ${item.stopReason?`<div class="ss-row"><span class="ss-k">سبب التوقف</span><span class="ss-v" style="color:var(--amber)">${item.stopReason}</span></div>`:''}
    <div class="ss-row"><span class="ss-k">الوقت</span><span class="ss-v">${fmtDT(item.createdAt)}</span></div>`;
}

function resetForm(){
  document.getElementById('formView').style.display='block';
  document.getElementById('successView').classList.remove('show');
  document.getElementById('f-title').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-stop').value='';
  document.getElementById('f-end').value='';
  document.getElementById('f-start').value=today();
  initTheme();
  document.getElementById('f-tc').textContent='0/120';
  document.querySelectorAll('#panel-form .s-opt').forEach(b=>b.className='s-opt');
  document.querySelectorAll('#brGrid .b-opt').forEach(b=>b.className='b-opt');
  document.querySelectorAll('#f-stop-chips .sc').forEach(c=>c.classList.remove('active'));
  document.getElementById('f-stop-panel').classList.remove('show');
  fStatus=null; fBranch=null; updP('f',0);
  window.scrollTo({top:0,behavior:'smooth'});
}

// TASKS LIST
function getTasks(){try{return JSON.parse(localStorage.getItem(SK_ACH)||'[]');}catch(e){return[];}}
function setTF(btn,val){
  document.querySelectorAll('.tfchip').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); tfFilter=val; renderTasks();
}
function renderTasks(){
  const all=getTasks(), sort=document.getElementById('sortSel')?.value||'date-desc';
  const list=document.getElementById('tasksList');
  let data=tfFilter==='all'?all:all.filter(t=>t.status===tfFilter);
  data=[...data].sort((a,b)=>{
    if(sort==='date-desc')return new Date(b.createdAt)-new Date(a.createdAt);
    if(sort==='date-asc') return new Date(a.createdAt)-new Date(b.createdAt);
    if(sort==='end-asc'){if(!a.end&&!b.end)return 0;if(!a.end)return 1;if(!b.end)return -1;return new Date(a.end)-new Date(b.end);}
    if(sort==='status'){const o=['متوقف','جارٍ','مخطط','مكتمل'];return o.indexOf(a.status)-o.indexOf(b.status);}
    if(sort==='prog-desc')return(parseInt(b.progress)||0)-(parseInt(a.progress)||0);
    return 0;
  });
  document.getElementById('tasksCnt').textContent=data.length;
  if(!data.length){list.innerHTML=`<div class="empty-tc"><div class="empty-tc-i">📋</div><div style="font-size:12px;color:var(--text-3)">${all.length===0?'لم تسجّل أي مهام بعد':'لا توجد مهام بهذا التصنيف'}</div></div>`;return;}
  const td=new Date();td.setHours(0,0,0,0);
  list.innerHTML=data.map((t,i)=>{
    const pct=parseInt(t.progress)||0;
    const brC=t.branch==='بريدة'?'tbr-brd':t.branch==='عنيزة'?'tbr-unz':'tbr-oth';
    let dl='';
    if(t.end&&t.status!=='مكتمل'){
      const ed=new Date(t.end);ed.setHours(0,0,0,0);
      const df=Math.round((ed-td)/86400000);
      dl=df<0?`<div class="tc-deadline dl-late">متأخر ${Math.abs(df)} يوم</div>`:
        df===0?`<div class="tc-deadline dl-today">موعد الاكتمال اليوم</div>`:
        df<=3?`<div class="tc-deadline dl-soon">متبقي ${df} أيام</div>`:
        `<div class="tc-deadline dl-ok">اكتمال: ${t.end}</div>`;
    }
    return `<div class="tc" style="animation-delay:${i*.04}s">
      <div class="tc-in">
        <div class="tc-bar tcb-${t.status}"></div>
        <div class="tc-body">
          <div class="tc-top">
            <div class="tc-title">${t.title}</div>
            <div class="tc-bgs">
              <span class="tbg ${brC}">${t.branch}</span>
              <span class="tbg tbs-${t.status}">${t.status}</span>
            </div>
          </div>
          ${t.desc?`<div class="tc-desc">${t.desc}</div>`:''}
          ${t.stopReason?`<div class="tc-stop">سبب التوقف: ${t.stopReason}</div>`:''}
          <div class="tc-prog"><div class="tc-ptrk"><div class="tc-pfll pf-${t.status}" style="width:${pct}%"></div></div><span class="tc-ppct">${pct}%</span></div>
          <div class="tc-dates">
            ${t.start?`<span class="tc-di">بدأ: <strong>${t.start}</strong></span>`:''}
            ${t.end?`<span class="tc-di">اكتمال: <strong>${t.end}</strong></span>`:''}
            <span class="tc-di">سُجّل: <strong>${fmtShort(t.createdAt)}</strong></span>
          </div>
        </div>
      </div>
      ${dl}
      <div class="tc-acts">
        <button class="tca" onclick="openEdit('${t.id}')">تعديل</button>
        <button class="tca red" onclick="askDel('${t.id}')">حذف</button>
      </div>
    </div>`;
  }).join('');
  updateTabCount();
}

// EDIT
function openEdit(id){
  const tasks=getTasks(), t=tasks.find(x=>x.id===id); if(!t)return;
  editingId=id;
  document.getElementById('e-id').value=t.id;
  document.getElementById('e-title').value=t.title;
  document.getElementById('e-desc').value=t.desc||'';
  document.getElementById('e-start').value=t.start||'';
  document.getElementById('e-end').value=t.end||'';
  document.getElementById('e-stop').value=t.stopReason||'';
  document.querySelectorAll('#e-stop-chips .sc').forEach(c=>c.classList.remove('active'));
  renderEBrGrid();
  eBranch=t.branch;
  document.querySelectorAll('#e-brGrid .b-opt').forEach(b=>{
    if(b.dataset.b===t.branch)b.classList.add('sel-'+(t.branch==='بريدة'?'بريدة':t.branch==='عنيزة'?'عنيزة':'other'));
  });
  eStatus=t.status;
  document.querySelectorAll('#editOv .s-opt').forEach(b=>{b.className='s-opt';if(b.dataset.s===t.status)b.classList.add('sel-'+t.status);});
  document.getElementById('e-stop-panel').classList.toggle('show',t.status==='متوقف');
  updP('e',t.progress||0);
  document.getElementById('editOv').classList.add('open');
}
function closeEdit(){document.getElementById('editOv').classList.remove('open');editingId=null;}

function saveEdit(){
  const title=document.getElementById('e-title').value.trim();
  if(!title){showToast('أدخل العنوان','err');return;}
  if(!eBranch){showToast('اختر الفرع','err');return;}
  if(!eStatus){showToast('اختر الحالة','err');return;}
  const sr=eStatus==='متوقف'?document.getElementById('e-stop').value.trim():'';
  if(eStatus==='متوقف'&&!sr){showToast('أدخل سبب التوقف','err');return;}
  try{
    let tasks=getTasks(); const idx=tasks.findIndex(x=>x.id===editingId);
    if(idx<0){showToast('المهمة غير موجودة','err');return;}
    const old={...tasks[idx]}, now=new Date().toISOString();
    tasks[idx]={...old, title, branch:eBranch, status:eStatus,
      desc:document.getElementById('e-desc').value.trim(),
      progress:parseInt(document.getElementById('e-prog').value)||0,
      stopReason:sr, start:document.getElementById('e-start').value,
      end:document.getElementById('e-end').value, updatedAt:now};
    localStorage.setItem(SK_ACH,JSON.stringify(tasks));
    const logs=JSON.parse(localStorage.getItem(SK_LOG)||'[]');
    const diff=buildDiff(old,tasks[idx]);
    logs.unshift({id:'l_'+Date.now(),achId:old.id,achTitle:tasks[idx].title,branch:tasks[idx].branch,action:'edit',detail:diff,changeNote:'',timestamp:now});
    localStorage.setItem(SK_LOG,JSON.stringify(logs.slice(0,300)));
    syncGAS(tasks[idx],false);
    closeEdit(); renderTasks(); showToast('تم حفظ التعديلات','ok');
  }catch(e){showToast('خطأ في الحفظ','err');}
}

function buildDiff(o,n){
  const p=[];
  if(o.title!==n.title)p.push(`العنوان: "${o.title}" → "${n.title}"`);
  if(o.branch!==n.branch)p.push(`الفرع: ${o.branch} → ${n.branch}`);
  if(o.status!==n.status)p.push(`الحالة: ${o.status} → ${n.status}`);
  if(o.progress!==n.progress)p.push(`الإنجاز: ${o.progress}% → ${n.progress}%`);
  return p.length?p.join(' | '):'تعديل عام';
}

// DELETE
function askDel(id){deletingId=id;document.getElementById('delBar').classList.add('open');}
function cancelDel(){deletingId=null;document.getElementById('delBar').classList.remove('open');}
function confirmDel(){
  try{
    let tasks=getTasks(); const t=tasks.find(x=>x.id===deletingId);
    tasks=tasks.filter(x=>x.id!==deletingId);
    localStorage.setItem(SK_ACH,JSON.stringify(tasks));
    if(t){
      const logs=JSON.parse(localStorage.getItem(SK_LOG)||'[]');
      logs.unshift({id:'l_'+Date.now(),achId:t.id,achTitle:t.title,branch:t.branch,action:'delete',detail:'تم حذف المهمة',changeNote:'',timestamp:new Date().toISOString()});
      localStorage.setItem(SK_LOG,JSON.stringify(logs.slice(0,300)));
      syncGAS({id:t.id},false,'delete');
    }
    cancelDel(); renderTasks(); showToast('تم الحذف','err');
  }catch(e){}
}

// GAS
async function syncGAS(item,isNew,action){
  if(!GAS_URL)return;
  const act=action==='delete'?'deleteMaintAch':isNew?'addMaintAch':'updateMaintAch';
  try{await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:act,data:item,id:item.id})});}catch(e){}
}

// HELPERS
function fmtShort(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('ar-SA',{month:'short',day:'numeric'}).replace(/\u200f/g,'');}
function fmtDT(iso){if(!iso)return'—';const d=new Date(iso);return fmtShort(iso)+' '+d.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});}
let tT;
function showToast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2600);}

// ── THEME TOGGLE ──
function initTheme() {
  const saved = localStorage.getItem('apx_theme') || 'dark';
  applyTheme(saved);
}
function applyTheme(mode) {
  document.body.classList.toggle('light', mode === 'light');
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = mode === 'light' ? '🌙' : '☀️';
  localStorage.setItem('apx_theme', mode);
}
function toggleTheme() {
  const isLight = document.body.classList.contains('light');
  applyTheme(isLight ? 'dark' : 'light');
}

// init theme
initTheme();
</script>
